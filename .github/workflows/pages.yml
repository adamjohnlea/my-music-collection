name: Deploy static site to GitHub Pages

on:
  # Publish whenever the committed static export in dist/ changes on main.
  push:
    branches: [main]
    paths:
      - 'dist/**'
      - '.github/workflows/pages.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push cancel an in-progress deploy, but never interrupt a
# run mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish dist/
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
